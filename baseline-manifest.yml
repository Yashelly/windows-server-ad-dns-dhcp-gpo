# Evidence policy
# - Evidence maturity is tracked in STATUS.md (Captured / Partial / Planned).
# - Placeholders exist only where capture is pending (structure remains reviewable).
# - Published evidence is sanitized where practical (no secrets, no identifiable user data).
# - Lab-only identifiers may remain for technical context (RFC1918 IPs, hostnames, example.local).

baseline:
  name: Windows Server AD/DNS/DHCP/GPO lab
  version: 0.1.1
  environment:
    domain:
      dns_root: example.local
      netbios: EXAMPLE
    hosts:
      dc:
        hostname: DC01
        fqdn: dc01.example.local
        ipv4: 10.10.10.10
      client:
        hostname: CL01
        ipv4: 10.10.10.50
    network:
      subnet: 10.10.10.0/24
      dns_server: 10.10.10.10
      default_gateway: null
    dhcp:
      scope: 10.10.10.0/24
      range:
        start: 10.10.10.50
        end: 10.10.10.200
      lease_duration_days: 8
      options:
        "003_router": null
        "006_dns_servers":
          - 10.10.10.10
        "015_dns_domain_name": example.local
    dns:
      zones:
        - example.local
        - _msdcs.example.local
    sysvol_paths:
      - "\\\\dc01\\SYSVOL"
      - "\\\\example.local\\SYSVOL"

quality_gates:
  module_docs:
    required_sections:
      - Goal
      - Implementation summary
      - Validation
      - Rollback
    evidence: optional
  runbooks:
    required_sections:
      - Symptoms
      - Checks
      - Fix
      - Validation
      - Rollback
    evidence: optional